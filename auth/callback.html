<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"/>
    <title>Microsoft OAuth 回调</title>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get("code");

            if (!code) {
                document.body.innerHTML = `
                    <h2>❌ 未检测到授权码</h2>
                    <a class="cta" href="https://mstodo.dpdns.org" target="_blank" id="cta">
                        访问 MS ToDo 官网
                    </a>`;
                return;
            }

            // 1. 尝试 opener.postMessage（大概率失败，但保留）
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage({type: "oauth_code", code}, "*");
                    console.log("📡 postMessage 已发送");
                }
            } catch (e) {
                console.warn("⚠️ postMessage 失败:", e);
            }

            // 2. 显示成功信息，延迟关闭（给插件轮询检测留出时间）
            document.body.innerHTML = `
        <h2>✅ 授权成功！</h2>
        <p>正在通知插件，请稍候...</p>
        <a class="cta" href="https://mstodo.dpdns.org" target="_blank" id="cta">访问 MS ToDo 官网</a>`;


            // 🔑 关键：延迟 4 秒再尝试关闭，让插件轮询能检测到 URL
            setTimeout(() => {
                try {
                    // 再次尝试通知
                    if (window.opener && !window.opener.closed) {
                        window.opener.postMessage({type: "oauth_code", code}, "*");
                    }
                } catch (e) {
                }
                // 尝试关闭窗口
                try {
                    window.close();
                } catch {
                }
            }, 4000);
        });
    </script>
</head>
<body>
<h2>正在处理授权结果...</h2>
</body>
</html>
